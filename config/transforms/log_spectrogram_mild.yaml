# Milder SpecAugment — same base pipeline as log_spectrogram, but with weaker SpecAug on train.
# This file defines ONLY the `transforms` group (no @package _global_), so that
# `config.transforms.train` / `val` / `test` stay at the expected level.

train:
  - _target_: emg2qwerty.transforms.ToTensor
    fields: [emg_left, emg_right]
  - _target_: emg2qwerty.transforms.ForEach
    transform:
      _target_: emg2qwerty.transforms.RandomBandRotation
      offsets: [-1, 0, 1]
  - _target_: emg2qwerty.transforms.TemporalAlignmentJitter
    max_offset: 120
  - _target_: emg2qwerty.transforms.LogSpectrogram
    n_fft: 64
    hop_length: 16
  - _target_: emg2qwerty.transforms.SpecAugment
    n_time_masks: 2
    time_mask_param: 15
    n_freq_masks: 1
    freq_mask_param: 3

val:
  - _target_: emg2qwerty.transforms.ToTensor
    fields: [emg_left, emg_right]
  - _target_: emg2qwerty.transforms.LogSpectrogram
    n_fft: 64
    hop_length: 16

test:
  - _target_: emg2qwerty.transforms.ToTensor
    fields: [emg_left, emg_right]
  - _target_: emg2qwerty.transforms.LogSpectrogram
    n_fft: 64
    hop_length: 16
